<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Secretaría - Salud Goya</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2>🏥 Salud Goya</h2>
      <ul class="nav-links">
        <li><a href="#" class="active" id="nav-agenda">📅 Agenda General</a></li>
      </ul>
      <button class="logout-btn" onclick="window.logout()">Cerrar Sesión</button>
    </aside>
    <main class="main-content">
      <header class="header">
        <h1>Panel de Secretaría</h1>
        <div style="display: flex; align-items: center; gap: 20px;">
          <div class="font-control" style="display: flex; align-items: center; gap: 5px;" title="Ajustar tamaño de letra">
            <span style="font-size: 0.8rem; color: var(--text-secondary);">A-</span>
            <input type="range" class="font-slider-input" min="14" max="22" value="16" style="width: 70px;">
            <span style="font-size: 1.1rem; color: var(--text-secondary);">A+</span>
          </div>
          <div class="user-profile">
            <span class="badge" style="background:#8b5cf6;color:#fff">Secretaría</span>
          </div>
        </div>
      </header>
      <section id="section-agenda" class="card">
        <div class="card-header">
          <h3>Todos los Turnos</h3>
          <input type="date" id="fecha-filtro" class="form-control" style="width: auto; background: var(--surface-dark);">
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Hora</th>
                <th>Paciente</th>
                <th>Médico</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-agenda"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Contenedor para notificaciones globales -->
  <div id="global-alert" class="alert hidden" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

  <!-- Modal para confirmaciones visuales -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-content" style="max-width:400px; text-align:center;">
      <h3 id="confirm-title" style="margin-top:0;">Confirmar</h3>
      <p id="confirm-message" style="margin-bottom:20px;"></p>
      <div style="display:flex; justify-content:center; gap:10px;">
        <button id="confirm-btn-cancel" class="btn" style="background:#e2e8f0; color:#1e293b;">Cancelar</button>
        <button id="confirm-btn-ok" class="btn btn-primary">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- Modal para cancelar turno -->
  <div id="cancelar-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-modal" onclick="cerrarModalCancelar()">&times;</span>
      <h2>Cancelar Turno</h2>
      <p>Indique el motivo de cancelación:</p>
      <input type="text" id="motivo-cancelacion-input" class="form-control" placeholder="Ej. Ausente sin aviso">
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
        <button class="btn" onclick="cerrarModalCancelar()">Volver</button>
        <button class="btn btn-primary" style="background:var(--danger-color);" onclick="confirmarCancelacion()">Cancelar Turno</button>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/secretaria.js"></script>
  <script src="js/accessibility.js"></script>
</body>
</html>
