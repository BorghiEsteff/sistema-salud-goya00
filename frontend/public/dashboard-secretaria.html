<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Secretaría - Salud Goya</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2>🏥 Salud Goya</h2>
      <ul class="nav-links">
        <li><a href="#" class="active" id="nav-agenda">Agenda General</a></li>
      </ul>
      <button class="logout-btn" onclick="window.logout()">Cerrar Sesión</button>
    </aside>
    <main class="main-content">
      <header class="header">
        <h1>Panel de Secretaría</h1>
        <div class="user-profile">
          <span class="badge" style="background:#8b5cf6;color:#fff">Secretaría</span>
        </div>
      </header>
      <section id="section-agenda" class="card">
        <div class="card-header">
          <h3>Todos los Turnos</h3>
          <input type="date" id="fecha-filtro" class="form-control" style="width: auto; background: var(--surface-dark);">
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Hora</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-agenda"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="js/api.js"></script>
  <script src="js/secretaria.js"></script>
</body>
</html>
