<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Médico - Salud Goya</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2>🏥 Salud Goya</h2>
      <ul class="nav-links">
        <li><a href="#" class="active" id="nav-agenda">📅 Mi Agenda</a></li>
      </ul>
      <button class="logout-btn" onclick="window.logout()">Cerrar Sesión</button>
    </aside>
    <main class="main-content">
      <header class="header">
        <h1>Panel del Médico</h1>
        <div style="display: flex; align-items: center; gap: 20px;">
          <div class="font-control" style="display: flex; align-items: center; gap: 5px;" title="Ajustar tamaño de letra">
            <span style="font-size: 0.8rem; color: var(--text-secondary);">A-</span>
            <input type="range" class="font-slider-input" min="14" max="22" value="16" style="width: 70px;">
            <span style="font-size: 1.1rem; color: var(--text-secondary);">A+</span>
          </div>
          <div class="user-profile" style="display:flex; align-items:center; gap:10px;">
            <div style="text-align:right; line-height:1.2;">
              <div id="medico-nombre-span" style="color:var(--text-primary); font-weight:600;"></div>
              <div id="medico-matricula-span" style="color:var(--text-secondary); font-size:0.85rem;"></div>
            </div>
            <span class="badge" style="background:var(--primary-color);color:#fff">Médico</span>
          </div>
        </div>
      </header>
      
      <div id="dashboard-global-error" class="alert error hidden" style="margin: 20px;"></div>

      <section id="section-agenda" class="card">
        <div class="card-header">
          <h3>Mis Turnos de Hoy</h3>
          <input type="date" id="fecha-filtro" class="form-control" style="width: auto; background: var(--surface-dark);">
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Hora</th>
                <th>Paciente</th>
                <th>DNI</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-agenda"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal de Historia Clínica -->
  <div id="historia-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-titulo">Cargar Historia Clínica</h2>
        <span class="close-modal" id="btn-cerrar-modal">&times;</span>
      </div>
      <div id="modal-alert" class="alert hidden"></div>
      <form id="historia-form">
        <input type="hidden" id="hc-turno-id">
        <input type="hidden" id="hc-paciente-id">
        
        <div class="form-group">
          <label for="hc-diagnostico">Diagnóstico *</label>
          <textarea id="hc-diagnostico" rows="3" required></textarea>
        </div>
        
        <div class="form-group">
          <label for="hc-indicaciones">Indicaciones / Receta</label>
          <textarea id="hc-indicaciones" rows="3"></textarea>
        </div>
        
        <div class="form-group">
          <label for="hc-observaciones">Observaciones Internas</label>
          <textarea id="hc-observaciones" rows="2"></textarea>
        </div>
        
        <div class="form-group">
          <label for="hc-proxima-consulta">Próxima Consulta (Opcional)</label>
          <input type="date" id="hc-proxima-consulta" class="form-control">
        </div>
        
        <div class="form-group">
          <label for="hc-archivo">Adjuntar Archivo (PDF, JPG, PNG)</label>
          <input type="file" id="hc-archivo" class="form-control" accept=".pdf,.jpg,.jpeg,.png">
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" id="btn-guardar-hc">Guardar Historia y Adjuntos</button>
      </form>
    </div>
  </div>

  <!-- Modal de Cancelación de Turno -->
  <div id="cancelar-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2>Motivo de Cancelación</h2>
        <span class="close-modal" onclick="document.getElementById('cancelar-modal').classList.add('hidden')">&times;</span>
      </div>
      <form id="cancelar-form">
        <input type="hidden" id="cancelar-turno-id">
        <div class="form-group">
          <label for="cancelar-motivo">Ingrese el motivo:</label>
          <textarea id="cancelar-motivo" rows="3" required placeholder="Ej: Médico indispuesto"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="background: var(--danger-color);">Confirmar Cancelación</button>
      </form>
    </div>
  </div>

  <!-- Modal Genérico de Confirmación -->
  <div id="confirmar-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
      <h2 id="confirmar-titulo">¿Estás seguro?</h2>
      <p id="confirmar-mensaje" style="margin: 15px 0;">Esta acción no se puede deshacer.</p>
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
        <button id="btn-confirmar-cancelar" class="btn" style="background: var(--surface-light); color: var(--text-primary);">Cancelar</button>
        <button id="btn-confirmar-aceptar" class="btn btn-primary">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- Modal Visor de Historial y PDFs (Módulo 3) -->
  <div id="visor-historial-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h2>Historial Clínico del Paciente</h2>
        <span class="close-modal" onclick="document.getElementById('visor-historial-modal').classList.add('hidden')">&times;</span>
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
        <!-- Columna Izquierda: Consultas Anteriores -->
        <div>
          <h3>Consultas</h3>
          <div id="historial-contenido" style="max-height: 300px; overflow-y: auto; background: var(--surface-dark); padding: 10px; border-radius: 8px;">
            Cargando...
          </div>
        </div>
        
        <!-- Columna Derecha: PDFs -->
        <div>
          <h3>Documentos PDF</h3>
          <ul id="archivos-lista" style="list-style: none; padding: 0; max-height: 200px; overflow-y: auto;">
            <!-- Se llena con JS -->
          </ul>
          
          <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
            <label style="font-size: 0.9rem;">Subir nuevos PDFs:</label>
            <input type="file" id="upload-pdf-input" class="form-control" multiple accept=".pdf" style="margin-bottom: 10px;">
            <button id="btn-subir-pdfs" class="btn btn-primary btn-block">Subir PDFs</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/medico.js"></script>
  <script src="js/accessibility.js"></script>
</body>
</html>
